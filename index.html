<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Free OpenRouter Chatbot</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e, #2a2a40);
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #181824;
      padding: 1rem;
      text-align: center;
      border-bottom: 2px solid #22c55e;
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
    }
    .user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      align-self: flex-start;
      background: #374151;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 1rem;
      background: #181824;
      border-top: 2px solid #22c55e;
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 25px;
      background: #2a2a40;
      color: white;
      font-size: 16px;
    }
    button {
      padding: 0 24px;
      background: #22c55e;
      color: black;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }
    .model-select {
      padding: 8px;
      background: #2a2a40;
      color: white;
      border-radius: 8px;
      border: 1px solid #4b5563;
    }
  </style>
</head>
<body>
  <header>
    <h1>🤖 Free OpenRouter Chatbot</h1>
    <select id="modelSelect" class="model-select">
      <option value="openrouter/free">Auto Free Router (Recommended)</option>
      <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (free)</option>
      <option value="qwen/qwen3-coder:free">Qwen3 Coder (free)</option>
      <option value="google/gemma-4-31b-it:free">Gemma 4 31B (free)</option>
      <option value="nvidia/nemotron-3-ultra-550b-a55b:free">Nemotron 3 Ultra (free)</option>
    </select>
  </header>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');

    // === CONFIG ===
    const API_KEY = "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";   // ← Put your OpenRouter API key here

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message || !API_KEY) return;

      addMessage("user", message);
      userInput.value = "";

      const typingId = addMessage("assistant", "Thinking...", true);
      const selectedModel = modelSelect.value;

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "HTTP-Referer": window.location.href,
            "X-Title": "My Free GitHub Chatbot",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: selectedModel,
            messages: [
              { role: "system", content: "You are a helpful, friendly, and intelligent assistant." },
              { role: "user", content: message }
            ],
            temperature: 0.7,
            max_tokens: 1024
          })
        });

        const data = await response.json();
        document.getElementById(typingId).remove();

        if (data.choices && data.choices[0]?.message?.content) {
          addMessage("assistant", data.choices[0].message.content);
        } else {
          addMessage("assistant", "Sorry, no response received.");
        }
      } catch (error) {
        document.getElementById(typingId).remove();
        addMessage("assistant", "Error: Check your API key and internet connection.");
        console.error(error);
      }
    }

    function addMessage(role, content, isTyping = false) {
      const id = 'msg-' + Date.now();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.id = id;
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return id;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Welcome
    window.onload = () => {
      addMessage("assistant", "Hello! I'm running on **free models** via OpenRouter. Pick a model above and start chatting!");
    };
  </script>
</body>
</html>
